name: Python type check Reusable

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
      install-command:
        required: false
        type: string
        default: "pip install -r requirements.txt"
      app-directory:
        required: false
        type: string
        default: "."

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests pandas-stubs
          ${{ inputs.install-command }}

      - name: Run mypy
        run: mypy -p ${{ inputs.app-directory }}
